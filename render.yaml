services:
  - type: web
    name: aqm-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: WAQI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
